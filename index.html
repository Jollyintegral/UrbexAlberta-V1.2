<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="gate" class="gate">
    <div class="gate-box">
      <h2>Access key required</h2>
      <input id="keyInput" type="password" placeholder="Enter key" autocomplete="off">
      <button onclick="verifyKey()">Unlock</button>
      <p id="gateError" class="gate-error"></p>
    </div>
  </div>

<header>
  <a href="#">Map</a>
  <a href="#">Locations</a>
</header>

<button id="addSpotBtn">Add Spot</button>

<div id="map"></div>
<div id="imageOverlay" class="image-overlay" style="display:none;"><img alt=""></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>

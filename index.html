<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urbex Alberta</title>
  <link rel="icon" type="image/png" href="Logo.png">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="map-page">

  <div id="gate" class="gate" style="display:none;">
    <div class="gate-box">
      <h2>Sign in required</h2>
      <p id="signedInUser" class="gate-user" style="display:none;"></p>
      <button id="googleSignInBtn" type="button">Sign in with Google</button>
      <button id="continueGuestBtn" type="button">Continue without sign in</button>
      <button id="signOutBtn" type="button" style="display:none;">Sign out</button>
      <p id="authStatus" class="gate-error"></p>
    </div>
  </div>

<header>
  <div class="header-brand">
    <img src="Logo.png" alt="Urbex Alberta logo" class="header-logo-icon">
    <span>Urbex Alberta</span>
  </div>
  <div class="header-center">
    <a href="index.html" class="top-nav-link is-active">Map</a>
    <a href="resources.html" class="top-nav-link">Resources</a>
  </div>
  <div class="header-right">
  <div id="accountMenuWrap" class="account-menu-wrap" style="display:none;">
    <button id="accountMenuBtn" class="account-menu-btn" type="button" aria-expanded="false">
      <span id="accountMenuName" class="account-menu-name">Account</span>
      <span id="accountMenuAvatar" class="account-menu-avatar">U</span>
    </button>
    <div id="accountDropdown" class="account-dropdown" style="display:none;">
      <button id="accountSettingsBtn" class="account-dropdown-item" type="button">Settings</button>
      <button id="accountSignOutBtn" class="account-dropdown-item account-dropdown-item-danger" type="button">Sign Out</button>
    </div>
  </div>
  <button id="headerSignInBtn" class="account-menu-btn" type="button" style="display:none;">Sign in</button>
  </div>
</header>

<button id="addSpotBtn">Add Spot</button>

<div id="map"></div>
<div id="imageOverlay" class="image-overlay" style="display:none;"><img alt=""></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
